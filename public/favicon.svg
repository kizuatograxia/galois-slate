<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1a32"/>
      <stop offset="100%" stop-color="#112040"/>
    </linearGradient>
    <radialGradient id="glow-top" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ab8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4a84e8" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- Outer circle — splitting field -->
  <circle cx="16" cy="16" r="11.2" stroke="#1d3e7a" stroke-width="0.9" opacity="0.55"/>

  <!-- Triangle — the three roots -->
  <polygon
    points="16,5.5 24.95,21.25 7.05,21.25"
    stroke="#3a72d8"
    stroke-width="1.6"
    stroke-linejoin="round"
    fill="none"
    filter="url(#soft)"
  />

  <!-- Root nodes -->
  <!-- Top node: brightest — the "generator" -->
  <circle cx="16" cy="5.5" r="2.6" fill="url(#glow-top)"/>
  <!-- Bottom-right -->
  <circle cx="24.95" cy="21.25" r="2.1" fill="#3a72d8"/>
  <!-- Bottom-left -->
  <circle cx="7.05" cy="21.25" r="2.1" fill="#3a72d8"/>
</svg>
